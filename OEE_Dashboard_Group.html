<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group OEE Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1623;--surf:#171f2e;--surf2:#1e2840;--bdr:#2a3550;
  --text:#e8edf5;--muted:#7a8aaa;--blue:#4a9eff;--green:#3ecf8e;
  --amber:#f5a623;--red:#f0544f;--orange:#ed7d31;--navy:#1F3864;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
#dropzone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:40px;transition:background .2s}
#dropzone.over{background:rgba(74,158,255,.07)}
.drop-icon{width:68px;height:68px;border:2px dashed var(--bdr);border-radius:14px;display:flex;align-items:center;justify-content:center}
.drop-icon svg{width:30px;height:30px;stroke:var(--muted);fill:none;stroke-width:1.5}
.drop-title{font-size:19px;font-weight:500}
.drop-sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.6}
.drop-btn{padding:9px 22px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)}
.drop-btn:hover{opacity:.85}
.history-pill{display:flex;align-items:center;gap:7px;background:var(--surf);border:1px solid var(--bdr);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer}
.history-pill:hover{border-color:var(--blue);color:var(--blue)}
.history-pill svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
#shell{display:none;flex-direction:column;height:100vh}
.hdr{background:var(--navy);padding:11px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-title{font-size:14px;font-weight:600}
.hdr-date{font-family:var(--mono);font-size:11px;color:#BDD7EE;background:rgba(255,255,255,.1);padding:3px 9px;border-radius:5px}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-btn{padding:4px 11px;background:rgba(255,255,255,.1);color:#BDD7EE;border:none;border-radius:5px;font-size:11px;cursor:pointer;font-family:var(--font)}
.hdr-btn:hover{background:rgba(255,255,255,.18)}
.hdr-btn.danger{background:rgba(240,84,79,.2);color:#f0544f}
.nav{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 22px;display:flex;gap:2px;flex-shrink:0}
.nb{padding:10px 15px;font-size:12px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;font-family:var(--font)}
.nb:hover{color:var(--text)}
.nb.active{color:var(--blue);border-bottom-color:var(--blue)}
.nb svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
.badge-count{background:var(--blue);color:#fff;font-size:9px;padding:1px 5px;border-radius:10px;font-family:var(--mono)}
.content{flex:1;overflow-y:auto;padding:16px 22px}
.panel{display:none}.panel.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:16px}
.kpi{background:var(--surf);border:1px solid var(--bdr);border-radius:9px;padding:12px 14px}
.kl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.kv{font-size:22px;font-weight:600;line-height:1;font-family:var(--mono)}
.kv.blue{color:var(--blue)}.kv.green{color:var(--green)}.kv.amber{color:var(--amber)}.kv.red{color:var(--red)}
.ks{font-size:10px;color:var(--muted);margin-top:3px}
.sec{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px}
.cg{display:grid;gap:10px;margin-bottom:10px}
.cg2{grid-template-columns:1fr 1fr}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:9px;padding:13px}
.card.full{grid-column:1/-1}
.ct{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.cw{position:relative;width:100%}
.leg{display:flex;gap:11px;font-size:10px;color:var(--muted);flex-wrap:wrap}
.leg span{display:flex;align-items:center;gap:4px}
.ld{width:8px;height:8px;border-radius:2px;display:inline-block}
.ld.ln{border-radius:0;height:2px;width:12px}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{text-align:left;padding:7px 8px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--bdr);font-size:10px;text-transform:uppercase;letter-spacing:.04em}
.tbl td{padding:7px 8px;border-bottom:1px solid var(--bdr)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surf2)}
.bc{display:flex;align-items:center;gap:5px}
.mb{height:10px;border-radius:2px;min-width:2px}
.badge{display:inline-block;font-size:9px;font-weight:600;padding:2px 6px;border-radius:20px;font-family:var(--mono)}
.badge.hi{background:rgba(240,84,79,.15);color:#f0544f}
.badge.med{background:rgba(245,166,35,.15);color:#f5a623}
.badge.lo{background:rgba(62,207,142,.15);color:#3ecf8e}
.badge.ok{background:rgba(74,158,255,.15);color:#4a9eff}
.obs-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.obs-item:last-child{border-bottom:none}
.onum{min-width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600}
.otitle{font-size:12px;font-weight:500;margin-bottom:2px}
.odet{font-size:11px;color:var(--muted);line-height:1.5}
.trend-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.trend-count{font-size:11px;color:var(--muted);font-family:var(--mono)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:0 4px}
.del-btn:hover{color:var(--red)}
.err{background:rgba(240,84,79,.1);border:1px solid rgba(240,84,79,.3);border-radius:8px;padding:11px 14px;font-size:12px;color:#f0544f;margin-bottom:12px}
input[type=file]{display:none}
@media print {
  body{background:#fff!important;color:#000!important;overflow:visible!important;height:auto!important}
  .hdr,.nav,.mac-filter-bar,#date-filter-bar,.hdr-right,#archive-tabs{display:none!important}
  .content{overflow:visible!important;padding:0!important}
  .panel{display:none!important}
  .panel.printing{display:block!important}
  .print-only{display:block!important}
  .no-print{display:none!important}
  @page{size:A4 landscape;margin:10mm}
  .report-section{page-break-inside:avoid;margin-bottom:8mm}
  .report-grid{display:grid!important}
  canvas{max-width:100%!important}
}
.print-header{display:none}
@media print{.print-header{display:flex;align-items:center;gap:12px;margin-bottom:8mm;border-bottom:2px solid #1F3864;padding-bottom:4mm}}


.gtab{background:transparent;border:none;color:var(--muted);padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;font-family:var(--font)}
.gtab:hover{color:var(--text)}
.gtab-active{color:var(--text);border-bottom:2px solid #4a9eff}

.gtab{background:transparent;border:none;color:var(--muted);padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;font-family:var(--font)}
.gtab:hover{color:var(--text)}
.gtab-active{color:var(--text);border-bottom:2px solid #4a9eff}
</style>
</head>

    <button class="gtab" data-tab="monthly" onclick="switchTab('monthly')">Monthly<span style="display:block;font-size:9px;font-weight:400;opacity:.7">Trend over time</span></button>
    <div style="margin-left:auto;display:flex;align-items:center;gap:12px;padding-bottom:6px;font-size:10px;color:var(--muted)">
      <span style="font-weight:600">Output vs theoretical:</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#3ecf8e;display:inline-block"></span>85%+</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#f5a623;display:inline-block"></span>65-84%</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#f0544f;display:inline-block"></span>below 65%</span>
    </div>
  </div>
  <div id="content" style="padding:18px 22px;overflow-y:auto;max-height:calc(100vh - 110px)"></div>
</div>

<script>
const FILLERS_MACHINES=['A004','A005','A006 B','A007','A008','A009','A015','A019','A031'];
const SOLVENTS_MACHINES=['S001','S002','S003','S004','S005','S006','S007','S008','S009'];
let SITES={fillers:null, solvents:null};
const GROUP_KEY='oee_group_sites';
function saveSites(){ try{ localStorage.setItem(GROUP_KEY, JSON.stringify(SITES)); }catch(e){} }
function loadSites(){ try{ const s=localStorage.getItem(GROUP_KEY); if(s){ const o=JSON.parse(s); if((o.fillers&&o.fillers.length)||(o.solvents&&o.solvents.length)){ SITES=o; return true; } } }catch(e){} return false; }
function clearSites(){ try{ localStorage.removeItem(GROUP_KEY); }catch(e){} SITES={fillers:null,solvents:null}; }

function combinedOEE(d,l){ d=d||0; l=l||0; return l>0?(d+l)/2:d; }

// Detect which site a JSON belongs to by its machine names
function detectSite(data){
  const macs=new Set();
  data.forEach(h=>{
    if(h.machOEE) Object.keys(h.machOEE).forEach(m=>macs.add(m));
    if(h.machKg) Object.keys(h.machKg).forEach(m=>macs.add(m));
  });
  let f=0,s=0;
  macs.forEach(m=>{
    const mm=m.trim().toUpperCase();
    if(SOLVENTS_MACHINES.includes(mm)) s++;
    else if(FILLERS_MACHINES.includes(mm)) f++;
    else if(mm.charAt(0)==='S') s++;   // any S-prefixed machine = solvents
    else if(mm.charAt(0)==='A') f++;   // any A-prefixed machine = fillers
  });
  console.log('detectSite: machines found',[...macs],'fillers='+f,'solvents='+s);
  return s>f ? 'solvents' : 'fillers';
}


function handleFiles(files){
  [...files].forEach(file=>{
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const data=JSON.parse(ev.target.result);
        // Gather machine names for diagnosis
        const macs=new Set();
        data.forEach(h=>{ if(h.machOEE) Object.keys(h.machOEE).forEach(m=>macs.add(m)); });
        const site=detectSite(data);
        SITES[site]=data;
        saveSites();
        updateLoadInfo();
        showDashboard();
        // Visible diagnosis
        const info=document.getElementById('load-info');
        if(info){ info.innerHTML+='<div>'+file.name+' → detected as <b>'+site.toUpperCase()+'</b> ('+data.length+' days, machines: '+[...macs].slice(0,6).join(', ')+(macs.size>6?'…':'')+')</div>'; }
      }catch(err){ alert('Could not read '+file.name+': '+err.message); }
    };
    reader.readAsText(file);
  });
}
function wireInput(id){ const el=document.getElementById(id); if(el){ el.addEventListener('change', function(e){ handleFiles(e.target.files); e.target.value=''; }); } }
wireInput('fi1');
wireInput('fi2');
// Drag and drop onto the whole window
['dragenter','dragover'].forEach(ev=>window.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();}));
window.addEventListener('drop',e=>{
  e.preventDefault();e.stopPropagation();
  if(e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files.length){ handleFiles(e.dataTransfer.files); }
});


function updateLoadInfo(){
  let parts=[];
  if(SITES.fillers) parts.push('Fillers: '+SITES.fillers.length+' days');
  if(SITES.solvents) parts.push('Solvents: '+SITES.solvents.length+' days');
  document.getElementById('load-info').textContent=parts.join('  ·  ')+'  — drop the other site too, or it will show what is loaded.';
}

// ── Date / period helpers ──
function dateTs(d){ const p=d.split(/[\/.\-]/); return new Date(+p[2],+p[1]-1,+p[0]).getTime(); }
function allDates(){
  const set=new Set();
  ['fillers','solvents'].forEach(s=>{ if(SITES[s]) SITES[s].forEach(h=>set.add(h.date)); });
  return [...set].sort((a,b)=>dateTs(a)-dateTs(b));
}
function monthKey(d){ const p=d.split(/[\/.\-]/); return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+p[1]-1]+' '+p[2]; }
function weekMonday(d){ const p=d.split(/[\/.\-]/); const dt=new Date(+p[2],+p[1]-1,+p[0]); const day=(dt.getDay()+6)%7; dt.setDate(dt.getDate()-day); return ('0'+dt.getDate()).slice(-2)+'/'+('0'+(dt.getMonth()+1)).slice(-2)+'/'+dt.getFullYear(); }

function populateDates(){
  const period=document.getElementById('period-sel').value;
  const sel=document.getElementById('date-sel');
  sel.innerHTML=''; sel.style.display=period==='all'?'none':'';
  const dates=allDates();
  if(period==='day'){
    [...dates].reverse().forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o);});
  } else if(period==='week'){
    const weeks=[...new Set(dates.map(weekMonday))].sort((a,b)=>dateTs(b)-dateTs(a));
    weeks.forEach(w=>{const o=document.createElement('option');o.value=w;o.textContent='Week of '+w;sel.appendChild(o);});
  } else if(period==='month'){
    // Sort months chronologically by first date in each
    const monthFirst={};
    dates.forEach(d=>{ const k=monthKey(d); if(!monthFirst[k]||dateTs(d)<monthFirst[k])monthFirst[k]=dateTs(d); });
    const months=Object.keys(monthFirst).sort((a,b)=>monthFirst[b]-monthFirst[a]);
    months.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o);});
  }
}

function filterDays(data){
  if(!data) return [];
  const period=document.getElementById('period-sel').value;
  const val=document.getElementById('date-sel').value;
  if(period==='all') return data;
  if(period==='day') return data.filter(h=>h.date===val);
  if(period==='week') return data.filter(h=>weekMonday(h.date)===val);
  if(period==='month') return data.filter(h=>monthKey(h.date)===val);
  return data;
}

// ── Aggregate a site's days into group metrics ──

function unitsOnHeadcountDays(days){
  // Sum output only from days that have headcount captured (for matching per-direct math)
  let out=0, vol=0;
  days.forEach(h=>{
    const L=h.labour; if(!L) return;
    const dh=(L.dayHeadcount||0)+(L.lateHeadcount||0);
    if(dh<=0) return;
    out+=(h.dayOut||0)+(h.lateOut||0);
    vol+=(h.dayKg||0)+(h.lateKg||0);
  });
  return {out, vol};
}

function aggHeadcount(days){
  // Average headcount categories across the period - ONLY over days that actually have headcount data
  // (historical days before headcount was captured have 0 and must not drag the average down)
  let opsC=0,opsT=0,bl=0,flt=0,sup=0,directs=0,head=0,n=0;
  days.forEach(h=>{
    const L=h.labour; if(!L) return;
    const dayHead=(L.dayHeadcount||0)+(L.lateHeadcount||0);
    if(dayHead<=0) return; // skip days with no headcount captured
    opsC+=(L.dayOpsContract||0)+(L.lateOpsContract||0);
    opsT+=(L.dayOpsTemp||0)+(L.lateOpsTemp||0);
    bl+=(L.dayBlenders||0)+(L.lateBlenders||0);
    flt+=(L.dayFLT||0)+(L.lateFLT||0);
    sup+=(L.daySupervisors||0)+(L.lateSupervisors||0);
    directs+=(L.dayDirects||0)+(L.lateDirects||0);
    head+=dayHead;
    n++;
  });
  if(!n) return null;
  return {
    opsContract: opsC/n, opsTemp: opsT/n, blenders: bl/n,
    flt: flt/n, supervisors: sup/n,
    directs: directs/n, headcount: head/n,
    daysWithData: n
  };
}

function siteMetrics(days){
  if(!days.length) return null;
  let oeeSum=0, oeeN=0, out=0, theo=0, vol=0, theoVol=0, dt=0;
  let demand=0, avail=0, directsSum=0, headSum=0, n=0;
  days.forEach(h=>{
    const o=combinedOEE(h.dayOEE,h.lateOEE);
    if(o>0){ oeeSum+=o; oeeN++; }
    out+=(h.dayOut||0)+(h.lateOut||0);
    theo+=(h.dayTheo||0)+(h.lateTheo||0);
    vol+=(h.dayKg||0)+(h.lateKg||0);
    theoVol+=(h.dayTheoKg||0)+(h.lateTheoKg||0);
    dt+=h.totalDT||0;
    if(h.labour){
      demand+=(h.labour.dayDemand||0)+(h.labour.lateDemand||0);
      avail+=(h.labour.dayAvail||0)+(h.labour.lateAvail||0);
      directsSum+=(h.labour.dayDirects||0)+(h.labour.lateDirects||0);
      headSum+=(h.labour.dayHeadcount||0)+(h.labour.lateHeadcount||0);
    }
    n++;
  });
  return {
    oee: oeeN?oeeSum/oeeN:null,
    out, theo, attain: theo?Math.round(out/theo*100):null,
    vol, theoVol,
    dt: Math.round(dt*10)/10,
    util: avail?Math.round(demand/avail*100):null,
    avgHeadcount: n?Math.round(headSum/n*10)/10:null,
    avgDirects: n?Math.round(directsSum/n*10)/10:null,
    unitsPerDirect: directsSum?Math.round(out/directsSum):null,
    volPerDirect: directsSum?Math.round(vol/directsSum):null,
    days:n
  };
}

function oeeColor(o){ return o==null?'var(--muted)':(o>=.85?'#3ecf8e':o>=.65?'#f5a623':'#f0544f'); }
function attColor(a){ return a==null?'var(--muted)':(a>=85?'#3ecf8e':a>=65?'#f5a623':'#f0544f'); }
function utilColor(u){ return u==null?'var(--muted)':(u>100?'#f0544f':(u>=85?'#3ecf8e':'#f5a623')); }

function showDashboard(){
  document.getElementById('dropzone').style.display='none';
  document.getElementById('shell').style.display='block';
  populateDates();
  render();
}

function machList(data){
  if(!data) return '';
  const macs=new Set();
  data.forEach(h=>{ if(h.machOEE) Object.keys(h.machOEE).forEach(m=>macs.add(m)); });
  return [...macs].join(', ');
}
function dataStatus(){
  const f=SITES.fillers?('Fillers ✓ ('+SITES.fillers.length+' days: '+machList(SITES.fillers)+')'):'Fillers — not loaded';
  const s=SITES.solvents?('Solvents ✓ ('+SITES.solvents.length+' days: '+machList(SITES.solvents)+')'):'Solvents — not loaded';
  const fc=SITES.fillers?'#3ecf8e':'#f5a623', sc=SITES.solvents?'#3ecf8e':'#f5a623';
  return '<div style="font-size:11px;margin-bottom:14px;padding:8px 12px;background:var(--surf2);border-radius:6px;line-height:1.8">'
    +'<div><span style="color:'+fc+'">●</span> '+f+'</div>'
    +'<div><span style="color:'+sc+'">●</span> '+s+'</div>'
    +'</div>';
}
function periodControls(){
  // Build a day/week/month/all selector for overview & pareto tabs
  const cur=window._gperiod||'all';
  let opts='';
  [['all','All data'],['month','Month'],['week','Week'],['day','Day']].forEach(([v,l])=>{
    opts+='<option value="'+v+'"'+(v===cur?' selected':'')+'>'+l+'</option>';
  });
  let html='<div style="display:flex;gap:8px;margin-bottom:14px;align-items:center">';
  html+='<span style="font-size:11px;color:var(--muted)">Period:</span>';
  html+='<select onchange="window._gperiod=this.value;window._gdate=null;render()" style="background:var(--surf2);color:var(--text);border:1px solid var(--bdr);border-radius:6px;padding:4px 8px;font-size:12px;font-family:var(--font)">'+opts+'</select>';
  // Date sub-selector
  if(cur!=='all'){
    const dates=allDates();
    let keys=[];
    if(cur==='day') keys=[...dates].reverse();
    else if(cur==='week') keys=[...new Set(dates.map(weekMonday))].sort((a,b)=>dateTs(b)-dateTs(a));
    else if(cur==='month'){ const mf={}; dates.forEach(d=>{const k=monthKey(d);if(!mf[k]||dateTs(d)<mf[k])mf[k]=dateTs(d);}); keys=Object.keys(mf).sort((a,b)=>mf[b]-mf[a]); }
    const curd=window._gdate||keys[0];
    let dopts='';
    keys.forEach(k=>{ dopts+='<option value="'+k+'"'+(k===curd?' selected':'')+'>'+(cur==='week'?'w/c '+k:k)+'</option>'; });
    html+='<select onchange="window._gdate=this.value;render()" style="background:var(--surf2);color:var(--text);border:1px solid var(--bdr);border-radius:6px;padding:4px 8px;font-size:12px;font-family:var(--font)">'+dopts+'</select>';
  }
  html+='</div>';
  return html;
}

function filterByPeriod(data){
  if(!data) return [];
  const cur=window._gperiod||'all';
  if(cur==='all') return data;
  const dates=allDates();
  let val=window._gdate;
  if(!val){
    if(cur==='day') val=[...dates].reverse()[0];
    else if(cur==='week') val=[...new Set(dates.map(weekMonday))].sort((a,b)=>dateTs(b)-dateTs(a))[0];
    else if(cur==='month'){ const mf={}; dates.forEach(d=>{const k=monthKey(d);if(!mf[k]||dateTs(d)<mf[k])mf[k]=dateTs(d);}); val=Object.keys(mf).sort((a,b)=>mf[b]-mf[a])[0]; }
  }
  if(cur==='day') return data.filter(h=>h.date===val);
  if(cur==='week') return data.filter(h=>weekMonday(h.date)===val);
  if(cur==='month') return data.filter(h=>monthKey(h.date)===val);
  return data;
}

function renderDaily(){
  const c=document.getElementById('content');
  let html=dataStatus()+periodControls();
  // Section 1: both sites' overview metrics for the selected period
  html+='<div style="font-size:15px;font-weight:700;margin:6px 0 12px">Site Performance</div>';
  html+=overviewHTML();
  // Section 2: issues (plan changes, downtime detail, category summary)
  html+='<div style="font-size:15px;font-weight:700;margin:28px 0 4px;padding-top:18px;border-top:1px solid var(--bdr)">Issues</div>';
  html+='<div style="font-size:11px;color:var(--muted);margin-bottom:12px">Outstanding items remain until they drop out of the site spreadsheets (e.g. a raw material issue clears once the material arrives).</div>';
  html+=issuesHTML();
  c.innerHTML=html;
}

function overviewHTML(){
  const f=siteMetrics(filterByPeriod(SITES.fillers));
  const s=siteMetrics(filterByPeriod(SITES.solvents));
  const fL=SITES.fillers?aggHeadcount(filterByPeriod(SITES.fillers)):null;
  const sL=SITES.solvents?aggHeadcount(filterByPeriod(SITES.solvents)):null;

  function kcard(label,val,color,sub){
    return '<div class="kpi"><div class="kl">'+label+'</div><div class="kv" style="color:'+(color||'var(--text)')+'">'+val+'</div>'+(sub?'<div class="ks">'+sub+'</div>':'')+'</div>';
  }
  function siteCol(title, m, L, volUnit, accent){
    let h='<div style="flex:1;min-width:280px">';
    h+='<div style="font-size:13px;font-weight:700;color:'+accent+';margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid '+accent+'">'+title+'</div>';
    if(!m){ h+='<div style="color:var(--muted);font-size:12px">No data loaded</div></div>'; return h; }
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h+=kcard('OEE', m.oee!=null?Math.round(m.oee*100)+'%':'—', oeeColor(m.oee), 'target 85%');
    h+=kcard('Output Attainment', m.attain!=null?m.attain+'%':'—', attColor(m.attain), 'vs theoretical');
    const unitAtt=m.theo?Math.round(m.out/m.theo*100):null;
    const volAtt=m.theoVol?Math.round(m.vol/m.theoVol*100):null;
    h+=kcard('Units Produced', m.out.toLocaleString(), attColor(unitAtt), 'theoretical '+(m.theo||0).toLocaleString()+(unitAtt!=null?' ('+unitAtt+'%)':''));
    h+=kcard('Volume ('+volUnit+')', m.vol.toLocaleString(), attColor(volAtt), 'theoretical '+(m.theoVol||0).toLocaleString()+' '+volUnit+(volAtt!=null?' ('+volAtt+'%)':''));
    h+=kcard('Labour Utilisation', m.util!=null?m.util+'%':'—', utilColor(m.util), 'demand vs available');
    h+=kcard('Total Downtime', m.dt+'h', m.dt>10?'#f0544f':'#f5a623', Math.round(m.dt*60)+' mins');
    h+=kcard('Head Count Total', L&&L.headcount!=null?(Math.round(L.headcount*10)/10):'—', 'var(--text)', 'all staff');
    h+=kcard('Total Directs', L&&L.directs!=null?(Math.round(L.directs*10)/10):'—', 'var(--text)', 'ops + blenders');
    h+=kcard('Units / Direct', (L&&L.directs)?Math.round(m.out/L.directs).toLocaleString():'—', '#4a9eff', 'productivity');
    h+=kcard(volUnit+' / Direct', (L&&L.directs)?Math.round(m.vol/L.directs).toLocaleString():'—', '#4a9eff', 'productivity');
    h+='</div></div>';
    return h;
  }

  let html='<div style="display:flex;gap:18px;flex-wrap:wrap">';
  html+=siteCol('Fillers &amp; Adhesives', f, fL, 'Kg', '#4a9eff');
  html+=siteCol('Solvents', s, sL, 'Litres', '#3ecf8e');
  html+='</div>';

  // Group Combined section
  const totUnits=(f?f.out:0)+(s?s.out:0);
  const totDirects=(fL&&fL.directs?fL.directs:0)+(sL&&sL.directs?sL.directs:0);
  const totHead=(fL&&fL.headcount?fL.headcount:0)+(sL&&sL.headcount?sL.headcount:0);
  const totDT=Math.round(((f?f.dt:0)+(s?s.dt:0))*10)/10;
  // Units per direct uses units ONLY from days that have headcount (matches denominator)
  const fHC=unitsOnHeadcountDays(filterByPeriod(SITES.fillers));
  const sHC=unitsOnHeadcountDays(filterByPeriod(SITES.solvents));
  const unitsForPD=fHC.out+sHC.out;
  let gOEE=null,wn=0,ww=0;
  if(f&&f.oee!=null){ wn+=f.oee*f.out; ww+=f.out; }
  if(s&&s.oee!=null){ wn+=s.oee*s.out; ww+=s.out; }
  if(ww>0) gOEE=wn/ww;
  html+='<div style="font-size:13px;font-weight:700;color:#a855f7;margin:22px 0 10px;padding-bottom:6px;border-bottom:2px solid #a855f7">Group Combined</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:760px">';
  html+=kcard('Group OEE', gOEE!=null?Math.round(gOEE*100)+'%':'—', oeeColor(gOEE), 'output-weighted');
  html+=kcard('Total Units', totUnits.toLocaleString(), 'var(--text)', 'both sites');
  html+=kcard('Total Headcount', totHead?(Math.round(totHead*10)/10):'—', 'var(--text)', 'all staff, both sites');
  html+=kcard('Total Directs', totDirects?(Math.round(totDirects*10)/10):'—', 'var(--text)', 'both sites');
  html+=kcard('Total Units / Direct', totDirects>0?Math.round(unitsForPD/totDirects).toLocaleString():'—', '#a855f7', 'group productivity');
  html+=kcard('Total Downtime', totDT+'h', totDT>20?'#f0544f':'#f5a623', 'both sites');
  html+='</div>';

  return html;
}

function aggPareto(days){
  // Pool category minutes AND occurrence counts across the period
  const cats={}; const counts={};
  let total=0;
  days.forEach(h=>{
    if(h.pareto) h.pareto.forEach(p=>{ cats[p.cat]=(cats[p.cat]||0)+p.mins; total+=p.mins; });
    // Count occurrences from the detailed dtLog
    (h.dtLog||[]).forEach(i=>{ if(i.cat){ counts[i.cat]=(counts[i.cat]||0)+1; } });
  });
  const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  let cum=0;
  return sorted.map(([cat,mins])=>{ cum+=mins; return {cat,mins,times:counts[cat]||0,pct:total?Math.round(mins/total*100):0,cum:total?Math.round(cum/total*100):0}; });
}

function paretoTable(pareto, accent){
  if(!pareto.length) return '<div style="color:var(--muted);font-size:12px">No downtime recorded</div>';
  const maxMins=pareto[0].mins;
  let h='<table class="tbl" style="width:100%"><thead><tr><th style="text-align:left">Category</th><th style="text-align:right">Times</th><th style="text-align:right">Mins</th><th style="text-align:right">Hrs</th><th style="text-align:right">%</th><th style="text-align:right">Cum%</th></tr></thead><tbody>';
  pareto.forEach(p=>{
    h+='<tr>';
    h+='<td style="font-size:11px">'+p.cat+'</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:11px;color:var(--muted)">'+(p.times||0)+'</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:11px">'+p.mins.toLocaleString()+'</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:11px">'+(Math.round(p.mins/60*10)/10)+'</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:11px">'+p.pct+'%</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:11px;color:var(--muted)">'+p.cum+'%</td>';
    h+='</tr>';
  });
  h+='</tbody></table>';
  return h;
}

function aggReasons(days){
  // Pool downtime by individual reason (not just category)
  const reasons={};
  days.forEach(h=>{
    (h.dtLog||[]).forEach(i=>{
      const key=(i.reason||'(no reason given)')+' | '+(i.cat||'');
      if(!reasons[key]) reasons[key]={reason:i.reason||'(no reason given)',cat:i.cat||'',mins:0,count:0};
      reasons[key].mins+=(i.mins||0);
      reasons[key].count++;
    });
  });
  return Object.values(reasons).sort((a,b)=>b.mins-a.mins);
}

function aggPlanChanges(days){
  // Pool plan change entries (PC) from dtLog and noteLog
  const out=[];
  days.forEach(h=>{
    [...(h.dtLog||[]),...(h.noteLog||[])].forEach(i=>{
      if(i.planChange) out.push({date:h.date,machine:i.machine,reason:i.reason||'(no comment)',shift:i.shift});
    });
  });
  return out;
}

function reasonTable(reasons, accent){
  if(!reasons.length) return '<div style="color:var(--muted);font-size:12px">No downtime recorded</div>';
  const maxMins=reasons[0].mins||1;
  let h='<table class="tbl" style="width:100%"><thead><tr><th style="text-align:left">Reason</th><th style="text-align:left">Category</th><th style="text-align:right">Mins</th><th style="text-align:right">Hrs</th></tr></thead><tbody>';
  reasons.forEach(p=>{
    h+='<tr>';
    h+='<td style="font-size:11px">'+p.reason+'</td>';
    h+='<td style="font-size:10px;color:var(--muted)">'+p.cat+'</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:11px">'+p.mins.toLocaleString()+'</td>';
    h+='<td style="text-align:right;font-family:var(--mono);font-size:11px">'+(Math.round(p.mins/60*10)/10)+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table>';
  return h;
}

function planChangeTable(pcs){
  if(!pcs.length) return '';
  let h='<div style="font-size:14px;font-weight:700;margin:24px 0 10px;color:#f5a623">Plan Changes (Raw Material)</div>';
  h+='<div style="font-size:11px;color:var(--muted);margin-bottom:10px">Planned product could not run due to raw material; line switched to an amended plan. High impact on customer requirements, no line time lost.</div>';
  h+='<table class="tbl" style="width:100%;max-width:640px"><thead><tr><th style="text-align:left">Date</th><th style="text-align:left">Shift</th><th style="text-align:left">Machine</th><th style="text-align:left">Reason / Comment</th></tr></thead><tbody>';
  pcs.forEach(p=>{
    h+='<tr style="background:rgba(245,166,35,.06)">';
    h+='<td style="font-size:10px;font-family:var(--mono)">'+p.date+'</td>';
    h+='<td style="font-size:10px">'+(p.shift==='day'?'Day':'Late')+'</td>';
    h+='<td style="font-size:11px;font-weight:500">'+p.machine+'</td>';
    h+='<td style="font-size:11px">'+p.reason+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table>';
  return h;
}

function renderTrends(mode){
  const c=document.getElementById('content');

  // Build period buckets: returns ordered list of {key,label,days:{fillers:[],solvents:[]}}
  function buildBuckets(mode){
    const buckets={};
    function add(site,h){
      let key,label;
      if(mode==='week'){ key=weekMonday(h.date); label='w/c '+key.slice(0,5); }
      else { key=monthKey(h.date); label=key; }
      if(!buckets[key]) buckets[key]={key,label,fillers:[],solvents:[]};
      buckets[key][site].push(h);
    }
    if(SITES.fillers) SITES.fillers.forEach(h=>add('fillers',h));
    if(SITES.solvents) SITES.solvents.forEach(h=>add('solvents',h));
    // Order chronologically
    const keys=Object.keys(buckets).sort((a,b)=>{
      const ta=mode==='week'?dateTs(a):dateTs('01/'+ (['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].indexOf(a.split(' ')[0])+1).toString().padStart(2,'0') +'/'+a.split(' ')[1]);
      const tb=mode==='week'?dateTs(b):dateTs('01/'+ (['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].indexOf(b.split(' ')[0])+1).toString().padStart(2,'0') +'/'+b.split(' ')[1]);
      return ta-tb;
    });
    return keys.map(k=>buckets[k]);
  }

  function fmt(n){ return n!=null?Math.round(n).toLocaleString():'—'; }
  function fmt1(n){ return n!=null?(Math.round(n*10)/10).toLocaleString():'—'; }

  // Compute the report metrics for one bucket+site
  function cellMetrics(days){
    if(!days||!days.length) return null;
    const m=siteMetrics(days);
    const L=aggHeadcount(days);
    const hc=unitsOnHeadcountDays(days); // units/vol only from days with headcount
    return {
      units:m.out, vol:m.vol, oee:m.oee, theo:m.theo, theoVol:m.theoVol,
      head:L?L.headcount:null, opsC:L?L.opsContract:null, opsT:L?L.opsTemp:null,
      directs:L?L.directs:null,
      unitsPerDirect:(L&&L.directs)?hc.out/L.directs:null,
      volPerDirect:(L&&L.directs)?hc.vol/L.directs:null,
      hcUnits:hc.out, hcVol:hc.vol
    };
  }

  // Build a trend table for a given mode (week/month)
  function trendTable(mode){
    const buckets=buildBuckets(mode);
    if(!buckets.length) return '<div style="color:var(--muted);padding:12px">No data</div>';
    const showVar=(buckets.length>=2); // comparative columns for both week and month
    // Column headers
    let head='<th style="text-align:left;position:sticky;left:0;background:var(--surf);min-width:200px">Metric</th>';
    buckets.forEach(b=>{ head+='<th style="text-align:right;min-width:90px;font-size:10px">'+b.label+'</th>'; });
    if(showVar){
      const avgLabel=mode==='week'?'4-Wk Avg':'3-Mth Avg';
      const lastLabel=mode==='week'?'Last v Avg':'Last v Avg';
      head+='<th style="text-align:right;min-width:90px;font-size:10px;border-left:2px solid var(--bdr)">'+avgLabel+'</th>';
      head+='<th style="text-align:right;min-width:90px;font-size:10px">'+lastLabel+'</th>';
    }

    function siteRows(siteKey, volUnit){
      const rows=[
        {label:'Weeks Production (Units)', val:m=>m.units, get:m=>fmt(m.units), col:m=>m.theo?attColor(Math.round(m.units/m.theo*100)):null},
        {label:'Theoretical (Units)', val:m=>m.theo, get:m=>fmt(m.theo)},
        {label:'Volume Produced ('+volUnit+')', val:m=>m.vol, get:m=>fmt(m.vol), col:m=>m.theoVol?attColor(Math.round(m.vol/m.theoVol*100)):null},
        {label:'Theoretical ('+volUnit+')', val:m=>m.theoVol, get:m=>fmt(m.theoVol)},
        {label:'Head Count Total', val:m=>m.head, get:m=>fmt1(m.head)},
        {label:'Operators Contracted', val:m=>m.opsC, get:m=>fmt1(m.opsC)},
        {label:'Operators Temps', val:m=>m.opsT, get:m=>fmt1(m.opsT)},
        {label:'Total Directs', val:m=>m.directs, get:m=>fmt1(m.directs)},
        {label:'Units Per Direct', val:m=>m.unitsPerDirect, get:m=>fmt(m.unitsPerDirect)},
        {label:volUnit+' Per Direct', val:m=>m.volPerDirect, get:m=>fmt(m.volPerDirect)},
        {label:'OEE', val:m=>m.oee, get:m=>m.oee!=null?Math.round(m.oee*100)+'%':'—'}
      ];
      return rows.map(r=>{
        let tr='<tr><td style="position:sticky;left:0;background:var(--bg);font-size:11px;padding-left:14px">'+r.label+'</td>';
        const series=[];
        buckets.forEach(b=>{
          const m=cellMetrics(b[siteKey]);
          const v=m?r.val(m):null;
          series.push(v);
          const cc=(m&&r.col)?r.col(m):null;
          tr+='<td style="text-align:right;font-family:var(--mono);font-size:11px'+(cc?';color:'+cc+';font-weight:600':'')+'">'+(m?r.get(m):'—')+'</td>';
        });
        if(showVar){
          // 4-week moving average of the last up-to-4 non-null values
          const vals=series.filter(x=>x!=null);
          const window=mode==='week'?4:3;
          const lastN=vals.slice(-window);
          const avg=lastN.length?lastN.reduce((a,b)=>a+b,0)/lastN.length:null;
          const lastVal=vals.length?vals[vals.length-1]:null;
          const ratio=(avg&&lastVal!=null&&avg!==0)?lastVal/avg:null;
          // Format avg like the row
          let avgFmt='—';
          if(avg!=null){ avgFmt=(r.label==='OEE')?Math.round(avg*100)+'%':((r.label.indexOf('Per Direct')>-1||r.label.indexOf('Production')>-1||r.label.indexOf('Volume')>-1)?fmt(avg):fmt1(avg)); }
          const ratioCol=ratio==null?'var(--muted)':(ratio>=0.98?'#3ecf8e':ratio>=0.90?'#f5a623':'#f0544f');
          tr+='<td style="text-align:right;font-family:var(--mono);font-size:11px;border-left:2px solid var(--bdr)">'+avgFmt+'</td>';
          tr+='<td style="text-align:right;font-family:var(--mono);font-size:11px;color:'+ratioCol+'">'+(ratio!=null?Math.round(ratio*100)+'%':'—')+'</td>';
        }
        return tr+'</tr>';
      }).join('');
    }

    const span=buckets.length+1+(showVar?2:0);
    function sectionRow(title){
      return '<tr><td colspan="'+span+'" style="position:sticky;left:0;background:var(--surf);font-weight:700;font-size:12px;color:var(--text);padding:8px 6px;border-top:2px solid var(--bdr)">'+title+'</td></tr>';
    }

    function combinedRows(){
      // Group totals: units and directs add up across both sites; per-direct = total units / total directs
      const rows=[
        {label:'Total Units Produced', get:(fm,sm)=>fmt((fm?fm.units:0)+(sm?sm.units:0))},
        {label:'Total Headcount (both sites)', get:(fm,sm)=>fmt1((fm&&fm.head?fm.head:0)+(sm&&sm.head?sm.head:0))},
        {label:'Total Directs (both sites)', get:(fm,sm)=>fmt1((fm&&fm.directs?fm.directs:0)+(sm&&sm.directs?sm.directs:0))},
        {label:'Total Units Per Direct', get:(fm,sm)=>{
          const u=(fm&&fm.hcUnits?fm.hcUnits:0)+(sm&&sm.hcUnits?sm.hcUnits:0);
          const d=(fm&&fm.directs?fm.directs:0)+(sm&&sm.directs?sm.directs:0);
          return d>0?fmt(u/d):'—';
        }},
        {label:'Group OEE (output-weighted)', get:(fm,sm)=>{
          let n=0,w=0;
          if(fm&&fm.oee!=null){ n+=fm.oee*fm.units; w+=fm.units; }
          if(sm&&sm.oee!=null){ n+=sm.oee*sm.units; w+=sm.units; }
          return w>0?Math.round(n/w*100)+'%':'—';
        }}
      ];
      return rows.map(r=>{
        let tr='<tr><td style="position:sticky;left:0;background:var(--bg);font-size:11px;padding-left:14px;font-weight:600">'+r.label+'</td>';
        const series=[];
        buckets.forEach(b=>{
          const fm=cellMetrics(b.fillers), sm=cellMetrics(b.solvents);
          const txt=r.get(fm,sm);
          series.push(txt);
          tr+='<td style="text-align:right;font-family:var(--mono);font-size:11px;font-weight:600">'+txt+'</td>';
        });
        if(showVar){
          // numeric variance on the combined row
          const nums=series.map(x=>{const n=parseFloat(String(x).replace(/[^0-9.\-]/g,''));return isNaN(n)?null:n;}).filter(x=>x!=null);
          const window=mode==='week'?4:3;
          const lastN=nums.slice(-window);
          const avg=lastN.length?lastN.reduce((a,b)=>a+b,0)/lastN.length:null;
          const lastVal=nums.length?nums[nums.length-1]:null;
          const ratio=(avg&&lastVal!=null&&avg!==0)?lastVal/avg:null;
          const ratioCol=ratio==null?'var(--muted)':(ratio>=0.98?'#3ecf8e':ratio>=0.90?'#f5a623':'#f0544f');
          tr+='<td style="text-align:right;font-family:var(--mono);font-size:11px;border-left:2px solid var(--bdr)">'+(avg!=null?(Math.round(avg*10)/10).toLocaleString():'—')+'</td>';
          tr+='<td style="text-align:right;font-family:var(--mono);font-size:11px;color:'+ratioCol+'">'+(ratio!=null?Math.round(ratio*100)+'%':'—')+'</td>';
        }
        return tr+'</tr>';
      }).join('');
    }

    let body=sectionRow('Fillers &amp; Adhesives')+siteRows('fillers','Kg');
    body+=sectionRow('Solvents')+siteRows('solvents','Litres');
    body+=sectionRow('Group Combined')+combinedRows();

    return '<div style="overflow-x:auto;border:1px solid var(--bdr);border-radius:8px"><table class="tbl" style="width:auto;min-width:100%;white-space:nowrap"><thead><tr>'+head+'</tr></thead><tbody>'+body+'</tbody></table></div>';
  }

  let html=dataStatus();
  if(mode==='week'){
    html+='<div style="font-size:15px;font-weight:700;margin:6px 0 2px">Weekly Operations View</div>';
    html+='<div style="font-size:11px;color:var(--muted);margin-bottom:12px">Each week across the columns; the final columns compare the latest week against the previous week.</div>';
    html+=trendTable('week');
  } else {
    html+='<div style="font-size:15px;font-weight:700;margin:6px 0 2px">Monthly Trend View</div>';
    html+='<div style="font-size:11px;color:var(--muted);margin-bottom:12px">Each month across the columns; the final columns compare the latest month against the rolling average.</div>';
    html+=trendTable('month');
  }
  html+='<div style="font-size:10px;color:var(--muted);margin-top:12px;line-height:1.6">Volume shown per site in its own unit (Fillers kg, Solvents litres). Head count and per-direct figures require the headcount data (C2-C6) on the shift sheets; sites without it show a dash. Scroll horizontally to see more periods.</div>';

  c.innerHTML=html;
}

// ── GitHub auto-read (A2) ──
const GH_BASE='https://raw.githubusercontent.com/Oeespreadsheet1876/oee-dashboard/main/';
const GH_FILES={ fillers:'OEE_history_trial.json', solvents:'OEE_history_solvents.json' };
function fetchSite(site){
  const url=GH_BASE+GH_FILES[site]+'?t='+Date.now();
  return fetch(url).then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(data=>{ if(Array.isArray(data)&&data.length){ SITES[site]=data; return true; } return false; })
    .catch(e=>{ console.log('Could not load '+site+' from GitHub:',e.message); return false; });
}
function autoLoad(){
  const info=document.getElementById('load-info');
  if(info) info.textContent='Loading both sites from GitHub...';
  Promise.all([fetchSite('fillers'),fetchSite('solvents')]).then(results=>{
    updateLoadInfo();
    if(SITES.fillers||SITES.solvents){ saveSites(); showDashboard(); }
    else { showDashboard(); } // show empty state with browse fallback
  });
}

// Startup: show shell, then try GitHub. Manual drop still works as fallback.
showDashboard();
autoLoad();
